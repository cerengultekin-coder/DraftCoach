<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fc4c02"/>
      <stop offset="1" stop-color="#8b5cf6"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="18" flood-color="#000" flood-opacity="0.45"/>
    </filter>
  </defs>

  <rect x="40" y="40" width="432" height="432" rx="96" fill="#07090d"/>
  <rect x="56" y="56" width="400" height="400" rx="86" fill="url(#g)" opacity="0.18"/>
  <rect x="56" y="56" width="400" height="400" rx="86" fill="none" stroke="rgba(255,255,255,0.18)" stroke-width="6"/>

  <!-- Minimal bike mark -->
  <g filter="url(#shadow)" stroke="rgba(255,255,255,0.92)" stroke-width="18" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <circle cx="165" cy="330" r="64"/>
    <circle cx="353" cy="330" r="64"/>
    <path d="M210 330 L260 220 L320 330"/>
    <path d="M260 220 L205 220"/>
    <path d="M205 220 L165 330"/>
    <path d="M260 220 L290 175"/>
    <path d="M290 175 L335 175"/>
  </g>

  <!-- DC letters -->
  <g font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial" font-weight="800">
    <text x="86" y="180" font-size="92" fill="rgba(255,255,255,0.95)">DC</text>
  </g>
</svg>